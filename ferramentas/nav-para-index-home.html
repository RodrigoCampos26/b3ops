<style>
#b3nav *{box-sizing:border-box;}
/* trigger (hambúrguer) — desktop */
.b3nav-trigger{position:fixed;top:18px;left:18px;z-index:1200;width:42px;height:42px;border-radius:10px;background:#16161a;border:1px solid #2a2a31;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .15s;}

#b3nav.open .b3nav-trigger span:nth-child(3){transform:translateY(-6px) rotate(-45deg);background:#f59e0b;}

.b3nav-scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1150;}

.b3nav-links{display:flex;flex-direction:column;gap:4px;flex:1;}
.b3nav-links a{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;color:#a8a8b0;text-decoration:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;transition:all .15s;position:relative;}

#b3nav[data-b3-active="home"]   .b3nav-links a[data-k="box"],
#b3nav[data-b3-active="price"] .b3nav-links a[data-k="price"],
#b3nav[data-b3-active="radar"] .b3nav-links a[data-k="radar"]{background:#221a0e;color:#f5b342;}
#b3nav[data-b3-active="home"]  .b3nav-links a[data-k="home"] i,
#b3nav[data-b3-active="home"]   .b3nav-links a[data-k="box"] i,
#b3nav[data-b3-active="price"] .b3nav-links a[data-k="price"] i,
#b3nav[data-b3-active="radar"] .b3nav-links a[data-k="radar"] i{color:#f59e0b;}
/* rodapé mobile — escondido no desktop */
.b3nav-bottom{display:none;}

  .b3nav-bottom a{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;border-radius:9px;color:#7a7a82;text-decoration:none;font-family:'Inter',sans-serif;font-size:10px;font-weight:500;min-width:56px;}
